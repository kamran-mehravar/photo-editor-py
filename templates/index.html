<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Photo Editor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Photo Editor</h1>
    <form id="uploadForm" enctype="multipart/form-data">
        <input type="file" id="imageUpload" name="file">
        <button type="submit">Upload Image</button>
    </form>

    <!-- Tabs for switching between HSL and Color adjustments -->
    <div id="tabs">
        <button id="tabHSL" class="active">HSL Adjustments</button>
        <button id="tabColor">Color Filters</button>
        <button id="tabLight">Light Adjustments</button>
    </div>

    <!-- HSL Controls -->
    <div id="hslControls">
        <div id="colorPalette">
            <button class="colorBtn active" data-color="all">All</button>
            <button class="colorBtn" data-color="red" style="background-color: red;"></button>
            <button class="colorBtn" data-color="orange" style="background-color: orange;"></button>
            <button class="colorBtn" data-color="yellow" style="background-color: yellow;"></button>
            <button class="colorBtn" data-color="green" style="background-color: green;"></button>
            <button class="colorBtn" data-color="blue" style="background-color: blue;"></button>
            <button class="colorBtn" data-color="purple" style="background-color: purple;"></button>
            <button class="colorBtn" data-color="brown" style="background-color: sienna;"></button>
        </div>
        <div id="sliders">
            <label for="hue">Hue:</label>
            <input type="range" id="hue" min="-180" max="180" value="0">
            <label for="saturation">Saturation:</label>
            <input type="range" id="saturation" min="-100" max="100" value="0">
            <label for="luminance">Luminance:</label>
            <input type="range" id="luminance" min="-100" max="100" value="0">
        </div>
    </div>

    <!-- Color Filters Controls (in a separate tab) -->
    <div id="colorControls" style="display:none;">
        <div>
            <label for="temp">Temperature:</label>
            <input type="range" id="temp" min="0.5" max="2" step="0.1" value="1">
        </div>
        <div>
            <label for="tint_red">Tint Red:</label>
            <input type="range" id="tint_red" min="0.5" max="2" step="0.1" value="1">
        </div>
        <div>
            <label for="tint_blue">Tint Blue:</label>
            <input type="range" id="tint_blue" min="0.5" max="2" step="0.1" value="1">
        </div>
        <div>
            <label for="vibrancy">Vibrancy:</label>
            <input type="range" id="vibrancy" min="0.5" max="2" step="0.1" value="1">
        </div>
        <div>
            <label for="sat_color">Color Saturation:</label>
            <input type="range" id="sat_color" min="0.5" max="2" step="0.1" value="1">
        </div>
        <button id="resetColorBtn">Reset Color Filters</button>

    </div>

 <!-- Light Adjustments Controls -->
    <div id="lightControls" style="display:none;">
        <label for="dehaze">Dehaze:</label>
        <input type="range" id="dehaze" min="-1" max="1" step="0.1" value="0">

        <label for="exposure">Exposure:</label>
        <input type="range" id="exposure" min="-1" max="1" step="0.1" value="0">

        <label for="brightness">Brightness:</label>
        <input type="range" id="brightness" min="-1" max="1" step="0.1" value="0">

        <label for="contrast">Contrast:</label>
        <input type="range" id="contrast" min="-1" max="1" step="0.1" value="0">

        <label for="highlights">Highlights:</label>
        <input type="range" id="highlights" min="-1" max="1" step="0.1" value="0">

        <label for="shadows">Shadows:</label>
        <input type="range" id="shadows" min="-1" max="1" step="0.1" value="0">

        <label for="whites">Whites:</label>
        <input type="range" id="whites" min="-1" max="1" step="0.1" value="0">

        <label for="blacks">Blacks:</label>
        <input type="range" id="blacks" min="-1" max="1" step="0.1" value="0">

        <!-- دکمه‌های ریست و دانلود مخصوص تب Light -->
        <button id="resetLightBtn">Reset Light</button>
        <button id="downloadLightBtn" style="display:none;">Download Light Image</button>
    </div>

    <img id="uploadedImage" src="" style="display:none; max-width:100%;">
    <button id="resetBtn">Reset HSL</button>
    <button id="downloadBtn" style="display:none;">Download Processed Image</button>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
